<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка платформы | MEGAHOME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="has-global-nav">

  <header class="global-nav" aria-label="Глобальная навигация">
    <div class="global-nav-inner">
      <a href="index.html" class="global-brand">MEGAHOME</a>
      <input type="checkbox" id="global-nav-toggle" class="global-nav-check" aria-label="Открыть меню">
      <label for="global-nav-toggle" class="global-nav-toggle" aria-hidden="true">
        <span></span><span></span><span></span>
      </label>
      <nav class="global-links">
        <a href="index.html" class="global-link">Главная</a>
        <a href="apartment.html" class="global-link">Квартира</a>
        <a href="add-expense.html" class="global-link">Счет</a>
        <a href="piggy-bank.html" class="global-link">Копилка</a>
        <a href="home-settings.html" class="global-link">Дом</a>
        <a href="platform-admin.html" class="global-link is-active">Админка</a>
        <a href="profile-settings.html" class="global-link">Профиль</a>
      </nav>
      <div class="global-nav-actions">
        <a href="add-expense.html" class="btn-primary btn-nav-compact">+ Добавить счёт</a>
        <a href="profile-settings.html" class="profile-avatar profile-avatar--nav" aria-label="Личный кабинет">У</a>
      </div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="sidebar surface-card geometric-sidebar">
      <div class="brand">MEGAHOME ADMIN</div>
      <nav class="nav-menu">
        <a href="platform-admin.html" class="nav-item active">Заявки на оплату</a>
        <a href="home-settings.html" class="nav-item">Управление домами</a>
        <a href="index.html" class="nav-item">Аудит системы</a>
      </nav>
    </aside>

    <main class="admin-content">
      <header class="admin-header">
        <h2 class="text-s1">Обработка счетов платформы</h2>
        <button type="button" class="btn-outline" id="generateHouseBtn">Сгенерировать новый дом (A-Z0-9)</button>
      </header>

      <div class="surface-card data-section geometric-grid">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID Счета</th>
              <th>Дом (Код)</th>
              <th>Категория</th>
              <th>Сумма</th>
              <th>Статус</th>
              <th>Обработка</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="mono-text">#INV-8891</td>
              <td class="mono-text">MEGAH0M3</td>
              <td>Обслуживание лифта</td>
              <td class="font-bold">€ 350.00</td>
              <td><span class="badge badge-warning" id="invoiceStatus">SENT_TO_PLATFORM</span></td>
              <td class="action-cell">
                <button type="button" class="btn-success-solid" data-status="paid">PAID</button>
                <button type="button" class="btn-danger-solid" data-status="unpaid">UNPAID</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var statusNode = document.getElementById("invoiceStatus");
      var generateBtn = document.getElementById("generateHouseBtn");

      if (generateBtn) {
        generateBtn.addEventListener("click", function () {
          window.location.href = "home-settings.html";
        });
      }

      document.querySelectorAll("[data-status]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (!statusNode) return;
          var type = btn.getAttribute("data-status");
          if (type === "paid") {
            statusNode.textContent = "PAID";
            statusNode.className = "badge badge-success";
          } else {
            statusNode.textContent = "UNPAID";
            statusNode.className = "badge badge-danger";
          }
        });
      });
    })();
  </script>
</body>
</html>
